<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FearlessAI</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="app">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">

            <div class="logo-icon">⚡</div>

            <div>

                <h2>FearlessAI</h2>
                <p>AI Without Limits</p>

            </div>

        </div>

        <button class="new-chat">

            + New Chat

        </button>

        <div class="history">

            <h4>Recent Chats</h4>

            <div class="chat-item active">

                💬 Welcome

            </div>

            <div class="chat-item">

                💻 Coding Help

            </div>

            <div class="chat-item">

                📚 Homework

            </div>

            <div class="chat-item">

                🎨 Image Ideas

            </div>

        </div>

        <div class="sidebar-bottom">

            <button>⚙ Settings</button>

            <button>👤 Profile</button>

        </div>

    </aside>

    <!-- Main -->

    <main class="main">

        <header class="topbar">

            <h1>FearlessAI</h1>

            <div class="status">

                ● Online

            </div>

        </header>

        <section class="messages">

            <div class="welcome">

                <h1>

                    Welcome to
                    <span>FearlessAI</span>

                </h1>

                <p>

                    Ask anything.
                    Code.
                    Learn.
                    Create.
                    Brainstorm.

                </p>

            </div>

        </section>

        <footer class="chatbar">

            <button class="icon-btn">📎</button>

            <input
            type="text"
            placeholder="Message FearlessAI...">

            <button class="icon-btn">🎤</button>

            <button class="send">

                ➜

            </button>

        </footer>

    </main>

</div>

<script src="script.js"></script>

</body>

</html>
