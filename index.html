<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FearlessAI</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


    <aside class="sidebar">

        <div class="logo">
            <div class="logo-icon">⚡</div>

            <div>
                <h2>FearlessAI</h2>
                <p>AI Without Limits</p>
            </div>

        </div>


        <button class="new-chat">
            + New Chat
        </button>


        <div class="history">

            <h4>Chats</h4>

            <div class="chat-item active">
                💬 New Chat
            </div>

        </div>


    </aside>



    <main class="main">


        <header class="topbar">

            <h1>FearlessAI</h1>

            <div class="status">
                ● Online
            </div>

        </header>



        <section class="messages">


            <div class="welcome">

                <h1>
                    Welcome to <span>FearlessAI</span>
                </h1>


                <p>
                    Ask questions, create ideas, code, learn and build.
                </p>


            </div>


        </section>




        <div class="chatbar">


            <button class="icon-btn">
                📎
            </button>


            <input
            class="message-input"
            type="text"
            placeholder="Message FearlessAI..."
            >



            <button class="send">
                ➜
            </button>


        </div>


    </main>


</div>



<script src="script.js"></script>


</body>

</html>
